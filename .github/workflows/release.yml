name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-aarch64:
    name: Build aarch64 Linux binary (musl)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with aarch64-musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Stage binary
        run: cp target/aarch64-unknown-linux-musl/release/kahu-daemon kahu-daemon-aarch64-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kahu-daemon-aarch64-linux
          generate_release_notes: true
